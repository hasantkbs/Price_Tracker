name: PriceTracker

options:
  bundleIdPrefix: com.algorix
  deploymentTarget:
    iOS: "16.0"

# ── Swift Package Manager bağımlılıkları ─────────────────────────────────────
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.0.0"

targets:
  PriceTracker:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    sources:
      - path: Sources/PriceTracker

    resources:
      - path: Resources

    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: $(PRODUCT_DISPLAY_NAME)
        CFBundleName: PriceTracker
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)

        # ── Gizlilik açıklamaları ─────────────────────────────────────────────
        NSUserNotificationsUsageDescription: "Takip ettiğiniz ürünlerin fiyatı düştüğünde bildirim almak için izin gerekiyor."
        NSLocalNetworkUsageDescription: "Yerel ağdaki fiyat takip sunucusuna bağlanmak için kullanılır."

        # ── Ağ güvenliği — web scraping kullanıcının girdiği her URL'ye bağlanır ───
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true

        # ── Başlatma ekranı ───────────────────────────────────────────────────
        UILaunchScreen:
          UIColorName: systemBackground

        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}

        # ── AdMob ─────────────────────────────────────────────────────────────
        GADApplicationIdentifier: $(GAD_APP_ID)
        GADIsAdManagerApp: false

        # ── SKAdNetwork (AdMob zorunlu) ───────────────────────────────────────
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
          - SKAdNetworkIdentifier: p78axxw29g.skadnetwork
          - SKAdNetworkIdentifier: v72qych5uu.skadnetwork
          - SKAdNetworkIdentifier: ludvb6z4gh.skadnetwork
          - SKAdNetworkIdentifier: 7ug5zh24hu.skadnetwork
          - SKAdNetworkIdentifier: mlmmfzh3r3.skadnetwork
          - SKAdNetworkIdentifier: 22mmun2rn5.skadnetwork
          - SKAdNetworkIdentifier: 4468km3ulz.skadnetwork
          - SKAdNetworkIdentifier: 2u9pt9hc89.skadnetwork

    entitlements:
      path: PriceTracker.entitlements

    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds

    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.algorix.pricetracker
        PRODUCT_DISPLAY_NAME: Fiyat Takibi
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        # IAP ürün kimliği — App Store Connect'te oluşturun
        IAP_PREMIUM_PRODUCT_ID: com.algorix.pricetracker.premium
      configs:
        Debug:
          # Google test App ID & Rewarded Ad Unit — geliştirme için güvenli
          GAD_APP_ID: ca-app-pub-3940256099942544~1458002511
          GAD_REWARDED_UNIT_ID: ca-app-pub-3940256099942544/1712485313
        Release:
          # GERÇEk AdMob kimliklerinizi buraya yazın (APPSTORE_GUIDE.md'ye bakın)
          GAD_APP_ID: ""
          GAD_REWARDED_UNIT_ID: ""
