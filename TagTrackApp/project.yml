name: TagTrack

options:
  bundleIdPrefix: com.tagtrack
  deploymentTarget:
    iOS: "16.0"

# ── Swift Package Manager bağımlılıkları ─────────────────────────────────────
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.0.0"

targets:
  TagTrack:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    sources:
      - path: Sources/TagTrack
      - path: Resources

    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: $(PRODUCT_DISPLAY_NAME)
        CFBundleName: TagTrack
        CFBundleIconName: TagTrackIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)

        # ── Gizlilik açıklamaları ─────────────────────────────────────────────
        NSUserNotificationsUsageDescription: "Takip ettiğiniz ürünlerin fiyatı düştüğünde bildirim almak için izin gerekiyor."
        NSUserTrackingUsageDescription: "Size uygun reklamlar gösterebilmek için cihaz tanımlayıcısına erişim izni gerekiyor."

        UIBackgroundModes:
          - fetch
          - processing

        BGTaskSchedulerPermittedIdentifiers:
          - com.tagtrack.app.pricecheck

        # ── Ağ güvenliği — web scraping kullanıcının girdiği her URL'ye bağlanır ───
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true

        # ── Başlatma ekranı ───────────────────────────────────────────────────
        UILaunchScreen:
          UIColorName: systemBackground

        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}

        # ── AdMob ─────────────────────────────────────────────────────────────
        GADApplicationIdentifier: $(GAD_APP_ID)
        GADIsAdManagerApp: false
        GADBannerAdUnitID: $(GAD_BANNER_UNIT_ID)
        GADRewardedAdUnitID: $(GAD_REWARDED_UNIT_ID)
        GADInterstitialAdUnitID: $(GAD_INTERSTITIAL_UNIT_ID)

